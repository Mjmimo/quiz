<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technology Quiz | Grade 8 Study Quiz Hub</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="subject-header">
      <div class="container">
        <a class="back-link" href="../index.html">← Back to home</a>
        <h1>Technology Quiz</h1>
        <p class="subtitle">Answer each multiple-choice question and get instant feedback.</p>
      </div>
    </header>

    <main class="container">
      <section class="quiz-shell" data-subject="technology" aria-live="polite">
        <div class="quiz-progress" id="quiz-progress"></div>
        <h2 id="question-text"></h2>
        <div class="choices" id="choices"></div>
        <p class="feedback" id="feedback"></p>
        <div class="quiz-actions">
          <p class="live-score">Score: <span id="score-value">0</span></p>
          <button id="next-btn" class="btn" disabled>Next question</button>
        </div>
      </section>

      <section class="quiz-result hidden" id="quiz-result">
        <h2>Quiz complete!</h2>
        <p id="final-score-text"></p>
        <p id="final-message"></p>
        <div class="result-actions">
          <button id="restart-btn" class="btn">Try again</button>
          <a class="btn btn-secondary" href="../index.html">Pick another subject</a>
          <a class="btn hidden" id="reward-link" href="#">Choose reward</a>
        </div>
      </section>
    </main>

    <script src="../assets/js/questions.js"></script>
    <script src="../assets/js/quiz.js"></script>
  </body>
</html>
